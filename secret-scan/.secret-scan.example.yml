# Secret Scan 配置示例文件
# 复制此文件为 .secret-scan.yml 并根据需要修改

# 熵值检测配置
entropy:
  # 是否启用熵值检测
  enabled: true
  # Base64 编码字符串熵值阈值（超过此值视为可疑）
  base64_threshold: 4.0
  # Hex 编码字符串熵值阈值
  hex_threshold: 3.5
  # Base64 字符串最小长度（低于此长度不计算熵值）
  min_length_base64: 20
  # Hex 字符串最小长度
  min_length_hex: 40

# 规则检测配置
rules:
  # 是否启用规则检测
  enabled: true
  # 自定义规则（参考内置规则格式）
  custom_rules:
    # 示例：自定义规则
    # - id: custom-my-service-token
    #   name: "My Service API Token"
    #   pattern: "mytoken_[A-Za-z0-9]{32}"
    #   severity: "high"
    #   description: "Detects My Service API tokens"
    #   tags: ["api", "token"]
  # 禁用的内置规则 ID 列表
  disabled_builtins: []
  # 例如:
  # disabled_builtins:
  #   - "generic-api-key"
  #   - "password-in-url"

# 白名单配置
whitelist:
  # 路径白名单（支持 glob 模式）
  paths:
    # - "tests/**/*"
    # - "**/*.sample.py"
    # - "docs/**"
  
  # 内容白名单（包含这些字符串的 finding 将被忽略）
  contents:
    # - "test-credential"
    # - "example-password"
    # - "placeholder"
  
  # 规则白名单（特定规则 ID 的 findings 全部忽略）
  rules: []
  # 例如:
  # rules:
  #   - "generic-api-key"

# 输出配置
output:
  # 是否显示详细输出
  verbose: false
  # 是否在报告中显示被白名单忽略的项
  show_ignored: false

# 扫描配置
scan:
  # 是否遵循 .gitignore 文件
  skip_gitignore: true
  # 跳过的目录列表
  skip_dirs:
    - ".git"
    - "__pycache__"
    - "node_modules"
    - ".venv"
    - "venv"
    - "dist"
    - "build"
    - ".pytest_cache"
    - ".mypy_cache"
  
  # 跳过的文件扩展名列表
  skip_extensions:
    - ".pyc"
    - ".class"
    - ".o"
    - ".so"
    - ".dll"
    - ".exe"
    - ".bin"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".bmp"
    - ".ico"
    - ".pdf"
    - ".zip"
    - ".tar"
    - ".gz"
    - ".rar"
    - ".7z"
    - ".mp3"
    - ".mp4"
    - ".avi"
    - ".mov"
  
  # 最大文件大小（MB），超过此大小的文件将被跳过
  max_file_size_mb: 1
