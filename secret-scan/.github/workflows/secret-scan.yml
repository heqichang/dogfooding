name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install secret-scan
        run: |
          pip install git+https://github.com/your-org/secret-scan.git@main
          # Or if using local installation:
          # pip install .

      - name: Run secret scan (diff mode)
        if: github.event_name == 'pull_request'
        run: |
          # Scan diff between PR base and HEAD
          secret-scan scan --diff ${{ github.event.pull_request.base.sha }}..${{ github.sha }} --json report.json
        continue-on-error: true

      - name: Run secret scan (full mode)
        if: github.event_name == 'push'
        run: |
          # Full scan on push to main/master
          secret-scan scan --full --json report.json
        continue-on-error: true

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-report
          path: report.json
          retention-days: 30

      - name: Check scan results
        if: always()
        run: |
          if [ -f report.json ]; then
            echo "Scan report generated successfully"
            # Optionally: parse and check if there are critical findings
          else
            echo "No report generated"
          fi
