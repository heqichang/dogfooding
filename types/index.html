<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字练习应用</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>打字练习</h1>
            <div class="header-controls">
                <select id="language-select">
                    <option value="english">英文练习</option>
                    <option value="chinese">中文练习</option>
                </select>
                <select id="level-select">
                    <option value="elementary">小学</option>
                    <option value="middle">初中</option>
                    <option value="high">高中</option>
                    <option value="daily">日常短句</option>
                    <option value="classics">经典名句</option>
                </select>
                <button id="sound-toggle-btn" class="btn-primary">🔊 音效: 开</button>
                <button id="custom-text-btn" class="btn-secondary">导入自定义文本</button>
                <button id="next-btn" class="btn-primary" style="display: none;">下一篇 (Enter)</button>
            </div>
        </header>

        <main class="main-content">
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">速度</span>
                    <span class="stat-value" id="wpm">0</span>
                    <span class="stat-unit">WPM</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">正确率</span>
                    <span class="stat-value" id="accuracy">100</span>
                    <span class="stat-unit">%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">时间</span>
                    <span class="stat-value" id="time">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">错误</span>
                    <span class="stat-value" id="errors">0</span>
                </div>
            </div>

            <div class="text-display" id="text-display">
                <p id="sample-text">准备开始练习...</p>
            </div>

            <div class="input-area">
                <textarea id="input-field" placeholder="在此输入..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
                <div class="input-feedback" id="input-feedback"></div>
            </div>
        </main>

        <div class="result-modal" id="result-modal" style="display: none;">
            <div class="result-content">
                <h2>练习完成！</h2>
                <div class="result-stats">
                    <div class="result-item">
                        <span class="result-label">打字速度</span>
                        <span class="result-value" id="result-wpm">0</span>
                        <span class="result-unit">WPM</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">正确率</span>
                        <span class="result-value" id="result-accuracy">0</span>
                        <span class="result-unit">%</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">用时</span>
                        <span class="result-value" id="result-time">00:00</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">错误次数</span>
                        <span class="result-value" id="result-errors">0</span>
                    </div>
                </div>
                <div class="result-actions">
                    <button id="retry-btn" class="btn-secondary">重新练习</button>
                    <button id="next-result-btn" class="btn-primary">下一篇 (Enter)</button>
                </div>
                <p class="hint">提示：按 Enter 键快速开始下一篇</p>
            </div>
        </div>

        <div class="custom-modal" id="custom-modal" style="display: none;">
            <div class="custom-content">
                <h2>导入自定义文本</h2>
                <p class="hint">请按以下格式输入文本（每行一段，空行分隔不同练习段落）：</p>
                <textarea id="custom-text-input" placeholder="第一段练习文本...

第二段练习文本..."></textarea>
                <div class="custom-actions">
                    <button id="cancel-custom-btn" class="btn-secondary">取消</button>
                    <button id="confirm-custom-btn" class="btn-primary">确认导入</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data/texts.js"></script>
    <script src="utils/audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
